name: CI

on:
  push:         { branches: [main] }
  pull_request: { branches: [main] }
  workflow_dispatch:

jobs:
  typecheck:
    name: Typecheck & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: Install dependencies (yarn — avoids npm 10.9.8 Exit-handler crash)
        run: yarn install --ignore-scripts --non-interactive
      - name: Type check
        run: yarn run check
      - name: Build SDK
        run: yarn run build
