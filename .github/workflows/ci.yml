name: CI

on:
  push:    { branches: [main] }
  pull_request: { branches: [main] }

jobs:
  check:
    name: Typecheck & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - run: npm install
      - run: npm run check
      - run: npm run build
      - name: Verify dist
        run: ls dist/index.js dist/index.cjs dist/index.d.ts && echo "dist verified ✓"
