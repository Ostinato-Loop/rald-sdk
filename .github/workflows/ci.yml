name: CI

on:
  push:         { branches: [main] }
  pull_request: { branches: [main] }
  workflow_dispatch:

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: Install type dependencies only
        run: npm install --save-dev typescript@5.4.5 tsup@8.1.0 --no-audit --no-fund
      - name: Type check
        run: npx tsc --noEmit
      - name: Build SDK
        run: npx tsup src/index.ts --format esm,cjs --dts --out-dir dist --no-splitting
