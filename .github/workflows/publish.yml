name: Publish to npm

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "npm dist-tag (e.g. latest, next, beta)"
        default:     latest
        required:    true

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    name: Build & Publish @rald/sdk
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache:        npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Build (ESM + CJS + types)
        run: npm run build

      - name: Verify dist
        run: |
          ls dist/index.js dist/index.cjs dist/index.d.ts
          echo "Dist verified ✓"

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Audit log
        if: always()
        run: echo "AUDIT service=rald-sdk action=npm-publish commit=${{ github.sha }} actor=${{ github.actor }} ts=$(date -u +%Y-%m-%dT%H:%M:%SZ) status=${{ job.status }}"
